name: Build on Fedora COPR

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          curl -sL https://copr.fedorainfracloud.org/coprs/g/copr/copr-cli/repo/ubuntu-24.04/group_copr-copr-cli-ubuntu-24.04.list | sudo tee /etc/apt/sources.list.d/copr-cli.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 4607814280185884
          sudo apt-get update
          sudo apt-get install -y copr-cli

      - name: Configure COPR
        run: |
          mkdir -p ~/.config
          echo "[copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = axogm
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org" > ~/.config/copr

      - name: Build SRPM
        run: |
          VERSION=$(grep "^Version:" pkg/rpm/mvgal.spec | awk '{print $2}')
          git archive --prefix=mvgal-${VERSION}/ -o mvgal-${VERSION}.tar.gz HEAD
          rpmbuild -bs pkg/rpm/mvgal.spec --define "_sourcedir $(pwd)" --define "_srcrpmdir $(pwd)"

      - name: Submit to COPR
        run: |
          copr-cli build axogm/mvgal mvgal-*.src.rpm
