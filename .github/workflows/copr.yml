name: Build on Fedora COPR

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger COPR build
        run: |
          curl -X POST "https://copr.fedorainfracloud.org/webhooks/custom/axogm/mvgal/" \
            -H "Content-Type: application/json" \
            --data '{"clone_url": "https://github.com/TheCreateGM/mvgal.git", "ref": "${{ github.event.inputs.branch }}"}'
