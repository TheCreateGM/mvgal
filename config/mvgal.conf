# MVGAL Configuration File
# Multi-Vendor GPU Aggregation Layer for Linux

[core]
# Enable/disable MVGAL globally
enabled = true

# Log level: error, warn, info, debug, trace
debug_level = info

# Number of GPUs to use (0 = auto-detect)
gpu_count = 0

# GPU indices to use (comma-separated, 0-based)
# gpu_indices = 0,1

# Default workload distribution strategy
# Valid: round_robin, afr, sfr, single, hybrid, custom
default_strategy = round_robin

# Enable cross-GPU memory migration
enable_memory_migration = true

# Enable DMA-BUF sharing
enable_dmabuf = true

# Enable kernel name resolution
enable_kernel_names = true

# Statistics collection interval (seconds)
stats_interval = 1

# Enable statistics collection
enable_stats = true

[gpu_0]
# Per-GPU configuration
# Vendor: amd, nvidia, intel, auto
type = auto

# GPU priority (lower = higher priority)
priority = 0

# Memory limit in MB (0 = unlimited)
memory_limit_mb = 0

# Enable/disable this GPU
enabled = true

[gpu_1]
priority = 1
enabled = true

[workload]
# Workload distribution settings

# AFR (Alternate Frame Rendering) settings
[afr]
enable_sync = true
sync_timeout_ms = 16

# SFR (Split Frame Rendering) settings
[sfr]
split_mode = horizontal
split_ratio = 0.5

# Hybrid settings
[hybrid]
primary_gpu = 0
fallback_gpu = 1
threshold_percent = 80

# Custom strategy script path
[custom]
script_path = /etc/mvgal/custom_strategy.lua

[cuda]
# CUDA API interception
enabled = true
intercept_driver = true
intercept_runtime = true

# Kernel launch interception
enable_launch_intercept = true

# Memory tracking
track_memory = true

[direct3d]
# Direct3D API interception (via Wine/Proton)
enabled = true

[metal]
# Metal API interception (Linux compatibility)
enabled = false

[webgpu]
# WebGPU API interception
enabled = true

[opencl]
# OpenCL API interception
enabled = true

[dri]
# DRM/DRI devices to enumerate
device_pattern = /dev/dri/card*

# Enable PRIME support
enable_prime = true

[debug]
# Enable per-API debug output
cuda_debug = false
d3d_debug = false
metal_debug = false
webgpu_debug = false
opencl_debug = false

# Dump intercepted calls to file
 dump_calls = false
 dump_file = /tmp/mvgal_dump.log

[network]
# Enable network peer discovery and remote GPU scheduling
enabled = false

# UDP discovery port
discovery_port = 42069

# TCP listener address for peer connections
listen_addr = 0.0.0.0

# TCP listener port (0 = auto)
listen_port = 0

# Broadcast address for peer discovery
broadcast_addr = 255.255.255.255

# Heartbeat interval in seconds
heartbeat_interval_s = 5

# Peer timeout in seconds (no response = stale)
peer_timeout_s = 30

[ai_scheduler]
# AI-driven scheduling model path
model_path = /etc/mvgal/models/scheduler.onnx

# Enable AI scheduler (requires model)
enabled = false

# Inference timeout in milliseconds
inference_timeout_ms = 10

# Fallback to dynamic scheduling on inference failure
fallback_on_error = true

# Minimum confidence threshold to use AI recommendation (0.0-1.0)
confidence_threshold = 0.6

# Collect inference statistics
enable_stats = true
