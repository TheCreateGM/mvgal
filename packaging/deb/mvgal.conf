# MVGAL Configuration File
# /etc/mvgal/mvgal.conf

[general]
# Enable/disable MVGAL globally
enabled = true

# Log level (0 = silent, 5 = verbose)
log_level = 3

# Enable debug mode
debug = false

[gpus]
# GPU detection mode
#   auto = auto-detect all available GPUs
#   manual = use explicit device list
devices = auto

# Manual device specification (comma-separated list of DRM nodes or PCI addresses)
# manual_devices = /dev/dri/card0,/dev/dri/card1,/dev/nvidia0

# Enable/disable individual GPUs by index
# GPU indices are assigned based on detection order
gpu_0_enabled = true
gpu_1_enabled = true
gpu_2_enabled = true
gpu_3_enabled = true

# Primary GPU index (for display output)
primary_gpu = 0

[scheduler]
# Distribution strategy
#   afr = Alternate Frame Rendering
#   sfr = Split Frame Rendering
#   task = Task-based distribution
#   compute = Compute offloading
#   hybrid = Adaptive (default)
#   single = Single GPU only
#   round_robin = Round-robin distribution
strategy = hybrid

# Enable load balancing
load_balance = true

# Enable thermal-aware scheduling
thermal_aware = true

# Enable power-aware scheduling
power_aware = true

# Minimum workload size (bytes) to distribute across GPUs
min_distribute_size = 1048576

# Load balance check interval (ms)
balance_interval_ms = 1000

[memory]
# Enable DMA-BUF support
use_dmabuf = true

# Enable Peer-to-Peer (P2P) transfers
p2p_enabled = true

# Replication threshold (bytes) - copy data to all GPUs if > this size
replicate_threshold = 16777216

# Enable Unified Virtual Memory (UVM) if available
uvm_enabled = false

# Maximum memory to use on each GPU (bytes, 0 = unlimited)
max_memory_per_gpu = 0

[vulkan]
# Enable Vulkan interception
enabled = true

# Enable Vulkan debug layer
debug = false

# Vulkan API version to report (as integer: major * 1000 + minor * 10 + patch)
api_version = 1003000

[opencl]
# Enable OpenCL interception
enabled = true

# OpenCL version to report
version = 3.0

[cuda]
# Enable CUDA interception (experimental)
enabled = false

# CUDA toolkit version to support
toolkit_version = 11.0

[daemon]
# Run as daemon (background process)
daemon_mode = true

# PID file location
pid_file = /var/run/mvgal/mvgal.pid

# Socket file location (for IPC)
socket_path = /var/run/mvgal/mvgal.sock

# User to run daemon as (usually root for GPU access)
run_as_user = root

# Group to run daemon as
run_as_group = root
