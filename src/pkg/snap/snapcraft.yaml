name: mvgal
base: core24
version: 0.1.0
summary: Multi-Vendor GPU Aggregation Layer for Linux
description: |
  MVGAL is a Linux kernel module and userspace library that provides
  a unified interface for managing multiple GPUs from different vendors
  (AMD, NVIDIA, Intel). It includes kernel module with DRM device
  enumeration, CUDA/D3D/Metal/WebGPU/OpenCL API interception, workload
  distribution strategies, cross-GPU memory migration, and DMA-BUF support.

confinement: strict
grade: stable

architectures:
  - build-on: amd64
    run-on: amd64

epochs:
  kernel: 6

plugs:
  kernel-module:
    interface: kernel-module
  dri:
    interface: content
    content: dri
    target: $SNAP/dri
  kmsg:
    interface: system-observe
  hardware-observe:
    interface: hardware-observe

slots:
  dbus-mvgal:
    interface: dbus
    bus: session
    name: org.mvgal.MVGAL

apps:
  mvgal:
    command: usr/bin/mvgal
    plugs: [kernel-module, dri, kmsg, hardware-observe, home, network]
    daemons: [simple]
    restart-condition: always

  mvgal-config:
    command: usr/bin/mvgal-config
    plugs: [home, network]

  mvgal-gui:
    command: usr/bin/mvgal-gui
    plugs: [x11, gsettings, hardware-observe]

  mvgal-tray:
    command: usr/bin/mvgal-tray
    plugs: [x11, gsettings, hardware-observe, desktop, desktop-legacy]
    daemon: simple

  mvgal-benchmark-synthetic:
    command: usr/bin/mvgal_synthetic_bench
    plugs: [hardware-observe]

  mvgal-benchmark-realworld:
    command: usr/bin/mvgal_realworld_bench
    plugs: [hardware-observe]

  mvgal-benchmark-stress:
    command: usr/bin/mvgal_stress_bench
    plugs: [hardware-observe]

parts:
  kernel-headers:
    plugin: nil
    build-packages: [linux-headers-generic]
    stage-packages: [linux-headers-$(uname -r)]

  mvgal:
    plugin: make
    source: .
    build-packages:
      - gcc
      - make
      - linux-headers-generic
      - libgl1-mesa-dev
      - libx11-dev
      - libgtk-3-dev
      - libdbus-1-dev
      - libpulse-dev
    stage-packages:
      - libgl1-mesa-glx
      - libgtk-3-0
      - libdbus-1-3
      - libpulse0
      - dmidecode
    override-build: |
      # Build kernel module
      cd src/kernel
      make -C /usr/src/linux-headers-$(uname -r) M=$(pwd) modules

      # Build userspace libraries
      cd ../userspace
      make all

      # Build benchmarks
      cd ../../benchmarks
      make all

      # Install everything
      install -Dm644 src/kernel/mvgal.ko $SNAPCRAFT_PART_INSTALL/lib/modules/mvgal.ko

      install -Dm755 src/userspace/libmvgal_core.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_core.so
      install -Dm755 src/userspace/intercept/cuda/libmvgal_cuda.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_cuda.so
      install -Dm755 src/userspace/intercept/d3d/libmvgal_d3d.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_d3d.so
      install -Dm755 src/userspace/intercept/metal/libmvgal_metal.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_metal.so
      install -Dm755 src/userspace/intercept/webgpu/libmvgal_webgpu.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_webgpu.so
      install -Dm755 src/userspace/intercept/opencl/libmvgal_opencl.so $SNAPCRAFT_PART_INSTALL/usr/lib/libmvgal_opencl.so

      install -Dm644 include/mvgal/*.h -t $SNAPCRAFT_PART_INSTALL/usr/include/mvgal/

      install -Dm755 benchmarks/synthetic/mvgal_synthetic_bench $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal_synthetic_bench
      install -Dm755 benchmarks/real_world/mvgal_realworld_bench $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal_realworld_bench
      install -Dm755 benchmarks/stress/mvgal_stress_bench $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal_stress_bench

      install -Dm755 tools/mvgal-config $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal-config
      install -Dm755 tools/mvgal $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal
      install -Dm755 gui/mvgal-gui $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal-gui
      install -Dm755 gui/mvgal-tray $SNAPCRAFT_PART_INSTALL/usr/bin/mvgal-tray

      install -Dm644 config/mvgal.conf $SNAPCRAFT_PART_INSTALL/etc/mvgal/mvgal.conf
      install -Dm644 config/org.mvgal.MVGAL-GUI.desktop $SNAPCRAFT_PART_INSTALL/usr/share/applications/org.mvgal.MVGAL-GUI.desktop
      install -Dm644 config/icons/hicolor/256x256/apps/mvgal.svg $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/mvgal.svg

      # Create wrapper for kernel module loading
      cat > $SNAPCRAFT_PART_INSTALL/usr/bin/load-modules << 'EOF'
#!/bin/bash
insmod $SNAP/lib/modules/mvgal.ko
EOF
      chmod +x $SNAPCRAFT_PART_INSTALL/usr/bin/load-modules

layout:
  /usr/src/linux-headers-$(uname -r):
    bind: $SNAP/usr/src/linux-headers-$(uname -r)
  /lib/modules:
    bind: $SNAP/lib/modules

hooks:
  configure:
    environment:
      LD_PRELOAD: $SNAP/usr/lib/libmvgal_core.so
      MVGAL_MODULE_PATH: $SNAP/lib/modules/mvgal.ko

environment:
  LD_PRELOAD: $SNAP/usr/lib/libmvgal_core.so
  MVGAL_CONFIG: $SNAP/etc/mvgal/mvgal.conf
